<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>加速面板</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="collapsed">
    <button id="orb" class="orb" type="button" aria-label="打开加速面板">
      <span class="orb-glow"></span>
      <span class="orb-rocket" aria-hidden="true">
        <svg viewBox="0 0 64 64">
          <path d="M38.5 5.5c7.6 1.1 13.8 7.3 15 15-6.2 1.6-12 5.1-17 10.1L25 42.1l-9.1-9.1 11.5-11.5c5-5 8.5-10.8 11.1-16Z" fill="currentColor"/>
          <path d="M22.8 19.7 11.7 18 6.8 27.8l10.8 2.9 5.2-11Zm21.5 21.5L46 52.3l-9.8 4.9-2.9-10.8 11-5.2Z" fill="currentColor" opacity=".72"/>
          <path d="M24.2 43.1 14.7 48c-2 1-4.2-1.2-3.2-3.2l4.9-9.5 7.8 7.8Z" fill="#ff8a13"/>
          <circle cx="40.4" cy="19.9" r="5.2" fill="white" opacity=".92"/>
        </svg>
      </span>
      <span id="orbCount" class="orb-count">0</span>
    </button>

    <main id="panel" class="panel">
      <header class="titlebar">
        <div class="title-group">
          <span class="title-icon" aria-hidden="true">
            <svg viewBox="0 0 64 64">
              <path d="M38.5 5.5c7.6 1.1 13.8 7.3 15 15-6.2 1.6-12 5.1-17 10.1L25 42.1l-9.1-9.1 11.5-11.5c5-5 8.5-10.8 11.1-16Z" fill="currentColor"/>
              <path d="M22.8 19.7 11.7 18 6.8 27.8l10.8 2.9 5.2-11Zm21.5 21.5L46 52.3l-9.8 4.9-2.9-10.8 11-5.2Z" fill="currentColor" opacity=".72"/>
              <path d="M24.2 43.1 14.7 48c-2 1-4.2-1.2-3.2-3.2l4.9-9.5 7.8 7.8Z" fill="#ff8a13"/>
              <circle cx="40.4" cy="19.9" r="5.2" fill="white" opacity=".92"/>
            </svg>
          </span>
          <div>
            <h1>加速面板</h1>
            <p id="subtitle">正在读取应用...</p>
          </div>
        </div>
        <button id="pinButton" class="icon-button" type="button" title="固定面板">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M15.8 3.4 20.6 8.2l-2.5 2.5 1.5 1.5-1.5 1.5-3.1-3.1-4.6 4.6.4 3.4-1.4 1.4-3.2-5.3-5.3-3.2 1.4-1.4 3.4.4 4.6-4.6-3.1-3.1 1.5-1.5 1.5 1.5 2.5-2.5Z" fill="currentColor"/>
          </svg>
        </button>
      </header>

      <section class="stats">
        <div class="stat">
          <span class="stat-icon foreground-icon"></span>
          <span class="stat-label">前台</span>
          <strong id="foregroundCount">0</strong>
        </div>
        <div class="divider"></div>
        <div class="stat">
          <span class="stat-icon background-icon"></span>
          <span class="stat-label">后台</span>
          <strong id="backgroundCount">0</strong>
        </div>
      </section>

      <section class="app-card">
        <div id="appList" class="app-list"></div>
        <div id="emptyState" class="empty-state">当前没有可显示的桌面应用</div>
      </section>

      <footer class="actions">
        <button id="cleanForeground" class="primary-action" type="button">
          <span class="action-icon foreground-icon"></span>
          清理前台
        </button>
        <button id="cleanBackground" class="secondary-action" type="button">
          <span class="action-icon background-icon"></span>
          清理后台
        </button>
      </footer>
      <div id="toast" class="toast"></div>
    </main>

    <script src="renderer.js"></script>
  </body>
</html>
